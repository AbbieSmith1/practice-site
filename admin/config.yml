backend:
  name: github
  repo: YOUR_GITHUB_USERNAME/YOUR_REPO_NAME # Replace with your actual info
  branch: main

media_folder: "images"
public_folder: "/images"

collections:
  - name: "stories"
    label: "All Stories"
    files:
      - label: "Home Page"
        name: "index"
        file: "index.html"
        fields:
          - {label: "Full Page Code", name: "body", widget: "code", default_language: "html"}
