<!DOCTYPE html>
<html lang="en">
<head>

    <style>
        body { font-family: 'Georgia', serif; background: #fcfcfc; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; color: #999; }
        .lock-screen { text-align: center; border: 1px solid #eee; padding: 40px; background: white; }
    </style>
</head>
<body>

    <div class="lock-screen" id="admin-gate">
        <p>This area is restricted.</p>
        Login as Owner</button>
    </div>

    <!-- The Actual Admin Content (Hidden until login) -->
    <div id="admin-tools" style="display:none; padding: 50px;">
        <h1>Owner Dashboard</h1>
        <!-- Paste your previous Story Generator Code here -->
    </div>

    <script>
        // Check if user is already logged in
        netlifyIdentity.on('init', user => {
            if (user) {
                showAdmin();
            } else {
                netlifyIdentity.open(); // Auto-open login if not logged in
            }
        });

        // After successful login
        netlifyIdentity.on('login', user => {
            showAdmin();
            netlifyIdentity.close();
        });

        function showAdmin() {
            document.getElementById('admin-gate').style.display = 'none';
            document.getElementById('admin-tools').style.display = 'block';
        }
    </script>
</body>
</html>
