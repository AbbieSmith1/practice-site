<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>of a story left untold | admin</title>
    <style>
        body { font-family: 'Georgia', serif; background: #fcfcfc; display: flex; justify-content: center; padding: 40px; color: #333; }
        .admin-card { background: white; padding: 40px; border: 1px solid #eee; max-width: 500px; width: 100%; }
        h1 { font-weight: normal; font-style: italic; font-size: 1.2rem; color: #999; margin-bottom: 30px; }
        label { display: block; font-size: 0.65rem; text-transform: uppercase; letter-spacing: 1px; color: #bbb; margin-top: 20px; }
        input, select, textarea { width: 100%; padding: 12px 0; border: none; border-bottom: 1px solid #eee; font-family: inherit; outline: none; background: transparent; }
        .btn { margin-top: 30px; width: 100%; background: none; border: 1px solid #eee; padding: 12px; font-family: inherit; font-size: 0.7rem; color: #888; cursor: pointer; text-transform: lowercase; }
        #admin-content { display: none; }
        #login-screen { text-align: center; margin-top: 100px; }
    </style>
</head>
<body>

    <!-- THE LOGIN SCREEN -->
    <div id="login-screen">
        <h1>enter the secret code</h1>
        <input type="password" id="pass-input" placeholder="password...">
        <button class="btn" onclick="checkPass()">enter</button>
    </div>

    <!-- THE ACTUAL TOOLS (HIDDEN) -->
    <div id="admin-content" class="admin-card">
        <h1>add to archive</h1>
        <label>category</label>
        <select id="cat"><option>poem</option><option>prose</option><option>letters</option><option>lyric essay</option></select>
        
        <label>archive number</label>
        <input type="text" id="arch" placeholder="#03">
        
        <label>title</label>
        <input type="text" id="title">
        
        <label>preview snippet</label>
        <input type="text" id="preview">
        
        <label>full text</label>
        <textarea id="content"></textarea>

        <button class="btn" onclick="generateStory()">generate & copy code</button>
        
        <div id="output" style="display:none; margin-top: 20px;">
            <label>copy this into your index.html:</label>
            <textarea id="final-code" style="height: 100px;" readonly></textarea>
        </div>
    </div>

    <script>
        function checkPass() {
            const pass = document.getElementById('pass-input').value;
            // CHANGE 'your-password-here' TO YOUR ACTUAL SECRET WORD
            if (pass === 'loveletterfromtheseatotheshore') {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('admin-content').style.display = 'block';
            } else {
                alert('Wrong code.');
            }
        }

        function generateStory() {
            const cat = document.getElementById('cat').value;
            const arch = document.getElementById('arch').value;
            const title = document.getElementById('title').value;
            const preview = document.getElementById('preview').value;
            const content = document.getElementById('content').value;

            const htmlSnippet = `
            <article class="post-box" data-category="${cat}" onclick="openReader(this)" onmouseenter="playRustle()">
                <div class="top">
                    <div class="post-meta">${cat}</div>
                    <div class="post-title">${title}</div>
                    <div class="post-preview">${preview}</div>
                </div>
                <div class="post-bottom"><span>archive ${arch}</span><span>open</span></div>
                <div class="full-text" style="display:none;">${content}</div>
            </article>`;

            document.getElementById('final-code').value = htmlSnippet.trim();
            document.getElementById('output').style.display = 'block';
            document.getElementById('final-code').select();
            document.execCommand('copy');
            alert('Code copied! Now go to GitHub and paste it.');
        }
    </script>
</body>
</html>
