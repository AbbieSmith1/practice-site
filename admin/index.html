<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>of a story left untold | admin</title>
    <style>
        body { font-family: 'Georgia', serif; background: #fcfcfc; padding: 40px; color: #333; display: flex; justify-content: center; }
        .admin-card { background: white; padding: 40px; border: 1px solid #eee; max-width: 500px; width: 100%; box-shadow: 0 10px 30px rgba(0,0,0,0.02); }
        h1 { font-weight: normal; font-style: italic; font-size: 1.5rem; margin-bottom: 30px; color: #999; }
        
        label { display: block; font-size: 0.65rem; text-transform: uppercase; letter-spacing: 1px; color: #bbb; margin-top: 20px; }
        input, select, textarea { 
            width: 100%; padding: 12px 0; border: none; border-bottom: 1px solid #eee; 
            font-family: inherit; outline: none; transition: 0.3s; background: transparent;
        }
        input:focus, textarea:focus { border-bottom-color: #333; }
        textarea { height: 100px; resize: vertical; }

        .gen-btn {
            margin-top: 40px; width: 100%; background: none; border: 1px solid #eee; 
            padding: 12px; font-family: inherit; font-size: 0.7rem; color: #888; 
            cursor: pointer; text-transform: lowercase; transition: 0.3s;
        }
        .gen-btn:hover { border-color: #333; color: #333; }

        #output-area { margin-top: 30px; display: none; }
        #final-code { 
            width: 100%; height: 120px; font-size: 0.7rem; font-family: monospace; 
            background: #f9f9f9; padding: 10px; border: 1px solid #eee; margin-top: 10px;
        }
        .copy-msg { font-size: 0.7rem; color: #27ae60; margin-top: 10px; font-style: italic; }
    </style>
</head>
<body>

<div class="admin-card">
    <h1>add to archive</h1>
    
    <label>category</label>
    <select id="cat">
        <option value="poem">poem</option>
        <option value="prose">prose</option>
        <option value="letters">letters</option>
        <option value="lyric essay">lyric essay</option>
    </select>

    <label>archive number</label>
    <input type="text" id="arch" placeholder="#03">

    <label>title</label>
    <input type="text" id="title" placeholder="the architecture of silence">

    <label>grid preview (short snippet)</label>
    <input type="text" id="preview" placeholder="every room we shared...">

    <label>full text</label>
    <textarea id="content" placeholder="write the full story here..."></textarea>

    <button class="gen-btn" onclick="generateStory()">Generate & Copy Code</button>

    <div id="output-area">
        <label>ready to paste:</label>
        <textarea id="final-code" readonly></textarea>
        <p class="copy-msg">Code copied! Paste this into your index.html inside the 'post-container'.</p>
    </div>
</div>

<script>
    function generateStory() {
        const cat = document.getElementById('cat').value;
        const arch = document.getElementById('arch').value;
        const title = document.getElementById('title').value;
        const preview = document.getElementById('preview').value;
        const content = document.getElementById('content').value;

        // Matches your exact HTML structure
        const htmlSnippet = `
        <article class="post-box" data-category="${cat}" onclick="openReader(this)" onmouseenter="playRustle()">
            <div class="top">
                <div class="post-meta">${cat}</div>
                <div class="post-title">${title}</div>
                <div class="post-preview">${preview}</div>
            </div>
            <div class="post-bottom"><span>archive ${arch}</span><span>open</span></div>
            <div class="full-text" style="display:none;">${content}</div>
        </article>`;

        const outputField = document.getElementById('final-code');
        outputField.value = htmlSnippet.trim();
        document.getElementById('output-area').style.display = 'block';
        
        outputField.select();
        document.execCommand('copy');
    }
</script>

</body>
</html>
